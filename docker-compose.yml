version: '3.8'

services:
  radio-app:
    build: .
    container_name: on-demand-radio-v2
    ports:
      - "3001:3001"
    volumes:
      - ./audio:/app/audio
      - ./episodes.db:/app/episodes.db
    restart: always
    environment:
      - NODE_ENV=production
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ALLOWED_ADMIN_EMAILS=${ALLOWED_ADMIN_EMAILS}
      - ALLOWED_VIEWER_EMAILS=${ALLOWED_VIEWER_EMAILS}
      - ALLOWED_TIME_RANGE=${ALLOWED_TIME_RANGE}
      - RESTRICTED_MESSAGE=${RESTRICTED_MESSAGE}

